version: "3.9"

# ─── Local development stack ──────────────────────────────────────────────────
# Usage:
#   docker compose up -d          # start everything
#   docker compose logs -f api    # tail api logs
#   docker compose down -v        # stop + remove volumes
#
# Environment variables are loaded from .env (gitignored).
# Copy .env.example → .env and fill in values before first run.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alshifa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-alshifa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alshifa_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-alshifa_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alshifa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alshifa_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: alshifa_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:     development
      PORT:         4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-alshifa}:${POSTGRES_PASSWORD:-alshifa_secret}@postgres:5432/${POSTGRES_DB:-alshifa_db}?schema=public
      REDIS_URL:    redis://redis:6379
      JWT_SECRET:   ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Forward all other env vars from .env
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      # Hot-reload in dev: mount source, exclude node_modules
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma migrate deploy && npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: alshifa_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../alshifa-frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:4000

volumes:
  postgres_data:
  redis_data:
